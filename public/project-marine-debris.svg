<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="marineTitle marineDesc">
  <title id="marineTitle">SSSC Marine Debris Database Demo</title>
  <desc id="marineDesc">A screenshot-style preview of the Sitka Sound Science Center marine debris dashboard.</desc>
  <defs>
    <linearGradient id="marineGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#183b64" />
      <stop offset="100%" stop-color="#0b6fa6" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f2f7ff" stop-opacity="0.95" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#marineGrad)" rx="40" ry="40" />
